name: API Smoke

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PORT: 3001
  BASE_URL: http://localhost:3001
  FLASK_ENV: testing
  PYTHONUNBUFFERED: 1
  PYTHONPATH: ${{ github.workspace }}

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install jq (system)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flask flask-cors python-dotenv
          fi

      - name: Create minimal .env for CI
        run: |
          cat > .env <<ENV
          FLASK_ENV=testing
          SECRET_KEY=ci-secret
          DATABASE_URL=sqlite:////tmp/app.db
          ENV

      - name: Preflight (Flask version & import app)
        run: |
          python - <<'PY'
          import sys
          try:
              import flask
              print("Flask version:", flask.__version__)
          except Exception as e:
              print("Cannot import Flask:", e); sys.exit(1)
          try:
              import src.app as appmod
              print("Import src.app OK")
          except Exception as e:
              print("Import src.app FAILED:", e); sys.exit(1)
          PY

      - name: Create smoke script
        run: |
          mkdir -p scripts
          cat > scripts/smoke_api.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          BASE="${1:-http://localhost:3001}"
          echo "🔎 Base: $BASE"

          need() { command -v "$1" >/dev/null || { echo "Instala $1"; exit 1; }; }
          need jq

          http()  { curl -sS -o /dev/null -w "%{http_code}" "$@"; }
          getj()  { curl -sS -H "Accept: application/json" "$@"; }
          postj(){ curl -sS -H "Content-Type: application/json" -H "Accept: application/json" -X POST -d "$2" "$1"; }

          echo "== Salud =="
          code=$(http "$BASE/api/ping");   [[ "$code" == "200" ]] && echo "✅ /api/ping -> 200" || { echo "❌ /api/ping -> $code"; exit 7; }
          code=$(http "$BASE/api/hello");  [[ "$code" == "200" ]] && echo "✅ /api/hello -> 200" || { echo "❌ /api/hello -> $code"; exit 7; }
          getj "$BASE/api/hello" | jq -e '.message' >/dev/null && echo "   JSON hello OK ✅"

          echo; echo "== Productos =="
          code=$(http "$BASE/api/products/"); [[ "$code" == "200" ]] && echo "✅ /api/products/ -> 200" || { echo "❌ /api/products/ -> $code"; exit 7; }
          LIST=$(getj "$BASE/api/products/")
          PID=$(echo "$LIST" | jq -r '.results[0].id // .[0].id // 1')
          echo "   Primer product_id: ${PID:-1}"
          code=$(http "$BASE/api/products/$PID"); [[ "$code" == "200" ]] && echo "✅ /api/products/$PID -> 200" || echo "⚠️ /api/products/$PID -> $code"

          echo; echo "== Auth =="
          TS=$(date +%s); EMAIL="test${TS}@example.local"; PASS="Test1234!"
          REG_CODE=$(http -H "Content-Type: application/json" -X POST -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" "$BASE/api/auth/register" || true)
          echo "   register -> $REG_CODE (ok si 200/201/409)"
          LOGIN_JSON=$(postj "$BASE/api/auth/login" "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" || true)
          TOKEN=$(echo "$LOGIN_JSON" | jq -r '.token // .access_token // .jwt // .data.token // empty')
          if [[ -n "${TOKEN:-}" && "$TOKEN" != "null" ]]; then
            echo "🔐 Token OK"
            AUTH=(-H "Authorization: Bearer $TOKEN")
          else
            echo "⚠️ Sin token; /users/* puede fallar"
            AUTH=()
          fi

          echo; echo "== Users =="
          if [[ ${#AUTH[@]} -gt 0 ]]; then
            code=$(http "${AUTH[@]}" "$BASE/api/users/me"); [[ "$code" == "200" ]] && echo "✅ /api/users/me -> 200" || echo "⚠️ /api/users/me -> $code"
            getj "$BASE/api/users/me" "${AUTH[@]}" | jq . || true
          else
            echo "   (saltando users/* por falta de token)"
          fi

          echo; echo "== Cart =="
          code=$(http "$BASE/api/cart/"); [[ "$code" == "200" ]] && echo "✅ GET /api/cart/ -> 200" || echo "⚠️ GET /api/cart/ -> $code"
          code=$(http -H "Content-Type: application/json" -X POST -d "{\"product_id\":$PID,\"qty\":1}" "$BASE/api/cart/"); echo "   POST /cart/ -> $code (200/201/204 ok; 401/403 si requiere auth)"

          echo; echo "🎉 Smoke extendido terminado."
          SH
          chmod +x scripts/smoke_api.sh

      - name: Start server & run smoke (same step)
        shell: bash
        env:
          FLASK_APP: src.app
        run: |
          set -euo pipefail
          set -x

          # Info
          python -m flask --version || true
          python -m flask routes || true

          # Arrancar Flask y log a archivo
          python -m flask run --host 0.0.0.0 --port "$PORT" > flask.log 2>&1 &
          pid=$!
          trap 'echo "Matando Flask ($pid)"; kill $pid || true' EXIT

          # Espera activa a /api/ping
          for i in {1..120}; do
            if curl -sf "${BASE_URL}/api/ping" >/dev/null; then
              echo "Servidor UP (pid=$pid)"
              break
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "❌ Flask murió antes de estar listo"
              sed -n '1,200p' flask.log || true
              exit 1
            fi
            sleep 1
          done

          tail -n 100 flask.log || true

          # Smoke
          scripts/smoke_api.sh "$BASE_URL"

      - name: Upload flask.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-log
          path: flask.log
